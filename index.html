<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大阪御朱印めぐり</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;900&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<div class="cover">
  <h1>大阪<span>御朱印</span><br>めぐり</h1>
</div>

<div class="section">
  <h2>四天王寺</h2>
  <div class="card">
    10:00 到着 / 約60分
    <div class="tip">石鳥居 → 五重塔 → 金堂 → 御朱印</div>
  </div>
</div>

<div class="section">
  <h2>豊國神社</h2>
  <div class="card">
    11:35 到着 / 約20分
    <div class="tip">鳥居 → 手水舎 → 本殿 → 御朱印</div>
  </div>
</div>

<div class="section">
  <h2>難波八阪神社</h2>
  <div class="card">
    13:30 到着
    <div class="tip">入口 → 手水 → 本殿 → 御朱印</div>
  </div>
</div>

</html>
