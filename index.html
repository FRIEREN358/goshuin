<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一粒万倍日 2026.05.02</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;900&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --ink: #1a1209;
  --paper: #f5f0e8;
  --vermillion: #c0392b;
  --gold: #b8860b;
  --moss: #4a5e3a;
  --stone: #8c7a6b;
  --border: #c8b89a;
}

/* ← ここ修正済み（超重要） */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Noto Sans JP', sans-serif;
  line-height: 1.8;
  max-width: 480px;
  margin: 0 auto;
}

/* カード */
.card{
  background:#fff;
  margin:14px;
  padding:16px;
  border-left:6px solid var(--vermillion);
  border-radius:10px;
  box-shadow: 2px 2px 8px rgba(0,0,0,0.05);
}

.title{
  font-weight:600;
  font-size:18px;
  margin-bottom:6px;
}

.time{
  color:#666;
  font-size:13px;
}

.tip{
  margin-top:10px;
  background:#f3e4e4;
  padding:10px;
  border-left:4px solid var(--vermillion);
  border-radius:6px;
  font-size:13px;
}

.header{
  padding:20px 16px;
  font-family:'Noto Serif JP', serif;
}

h1{
  font-size:24px;
  margin-bottom:6px;
}
</style>

</head>

<body>

<div class="header">
<h1>大阪御朱印めぐり</h1>
<div class="time">2026.05.02 / 9:00 → 17:00</div>
</div>

<div class="card">
<div class="title">🛕 四天王寺</div>
<span class="time">10:00 到着</span><br>
所要：約60分

<div class="tip">
混雑時は中心伽藍スキップOK
</div>
</div>

<div class="card">
<div class="title">⛩ 豊國神社</div>
<span class="time">11:35 到着</span><br>
所要：約20分

<div class="tip">
参拝順路：鳥居 → 手水舎 → 本殿 → 御朱印所
</div>
</div>

<div class="card">
<div class="title">⛩ 難波八阪神社</div>
<span class="time">13:30 到着</span><br>
閉門17:00

<div class="tip">
参拝順路：入口 → 手水 → 本殿 → 御朱印
</div>

<div class="tip">
写真より先に参拝
</div>
</div>

<div class="card">
<div class="title">🏠 帰り</div>
15:30〜16:30頃
</div>

</body>
</html>
